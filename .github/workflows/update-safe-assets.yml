name: Update SAFE Assets

on:
  schedule:
    # 09:00 Asia/Shanghai on the 10th day of each month.
    - cron: "0 1 10 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update SAFE assets
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            FORCE_RUN=1 python scripts/update_safe_assets.py
          else
            python scripts/update_safe_assets.py
          fi

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reserve-assets/assets.csv
          git commit -m "Update SAFE official reserve assets"
          git push
